    <ellipse cx="-130" cy="-90" rx="90" ry="140" fill="url(#shine)"/>
    <ellipse cx="-160" cy="-140" rx="28" ry="45" fill="#FFFFFF" fill-opacity="0.7"/>

    <circle cx="60"  cy="100" r="9" fill="#FFFFFF" fill-opacity="0.15"/>
    <circle cx="-30" cy="160" r="7" fill="#FFFFFF" fill-opacity="0.12"/>
    <circle cx="110" cy="150" r="7" fill="#FFFFFF" fill-opacity="0.12"/>
    <circle cx="30"  cy="220" r="6" fill="#FFFFFF" fill-opacity="0.10"/>
    <circle cx="-80" cy="60"  r="6" fill="#FFFFFF" fill-opacity="0.10"/>
