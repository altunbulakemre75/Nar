<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDFB"/>
      <stop offset="100%" stop-color="#FBE6DE"/>
    </linearGradient>
    <radialGradient id="body" cx="38%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#F26B6B"/>
      <stop offset="35%" stop-color="#D83838"/>
      <stop offset="75%" stop-color="#A01E1E"/>
      <stop offset="100%" stop-color="#6B1414"/>
    </radialGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
